<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capaciteitentest Trainer</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Capaciteitentest Trainer</h1>
      <p class="tagline">Oefen onbeperkt op capaciteiten- en intelligentietesten</p>
    </header>

    <!-- Startscherm -->
    <section id="menu" class="card">
      <button id="start-mixed" class="primary-btn big">&#9654; Gemengd oefenen</button>
      <p class="hint centered">Aanbevolen. De aangevinkte categorie&euml;n komen willekeurig langs.</p>

      <h2>Categorie&euml;n</h2>
      <p class="hint">Vink aan wat je in <b>gemengd</b> wilt, of oefen los met &laquo;Oefen&raquo;.</p>
      <div class="cat-list" id="cat-list">
        <!-- rijen worden gevuld door app.js -->
      </div>

      <div class="options-row">
        <label class="toggle">
          <input type="checkbox" id="timer-toggle" checked />
          <span>Timer per vraag</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="autoadvance-toggle" checked />
          <span>Automatisch door na antwoord</span>
        </label>
      </div>
      <p class="hint">Tip: beantwoord met de toetsen <kbd>1</kbd>–<kbd>6</kbd>.</p>
    </section>

    <!-- Quizscherm -->
    <section id="quiz" class="card hidden">
      <div class="quiz-top">
        <button id="back-btn" class="ghost-btn">&#8592; Menu</button>
        <div class="stats">
          <span class="stat">Vraag <b id="q-count">1</b></span>
          <span class="stat">Score <b id="q-score">0</b></span>
          <span class="stat">Reeks <b id="q-streak">0</b></span>
          <span class="stat timer" id="q-timer">--</span>
        </div>
      </div>

      <div id="question-area">
        <div id="q-title" class="q-title"></div>
        <div id="prompt" class="prompt-row"></div>
        <div id="options" class="options-grid"></div>
      </div>

      <div id="feedback" class="feedback hidden">
        <div id="feedback-headline" class="feedback-headline"></div>
        <div id="feedback-explanation" class="feedback-explanation"></div>
        <button id="next-btn" class="primary-btn">Volgende &#8594;</button>
      </div>
    </section>

    <footer>
      <span id="session-summary"></span>
    </footer>
  </div>

  <script src="js/sequences.js?v=4"></script>
  <script src="js/rotation.js?v=4"></script>
  <script src="js/figures.js?v=4"></script>
  <script src="js/arrows.js?v=4"></script>
  <script src="js/staticseries.js?v=4"></script>
  <script src="js/counting.js?v=4"></script>
  <script src="js/stats.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
